<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的像素音乐盒 - v5.0 官方发布版</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --mario-red: #E52521;
            --pixel-white: #FFFFFF;
            --outline-black: #000000;
            --famicom-grey: #F8F8F8;
            --progress-filled: #FFFFFF;
            --progress-bg: #FFFFFF44;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'VT323', monospace; 
            font-size: 24px;
            background-color: var(--outline-black);
            color: var(--outline-black);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column; 
            user-select: none;
        }

        h1, h2, .song-title, .artist-name { font-family: 'DotGothic16', sans-serif; font-weight: normal; }

        /* 布局骨架 */
        .container {
            display: flex;
            height: calc(100vh - 100px); 
            width: 100vw;
            flex-direction: row; 
        }

        /* 左侧：播放器中枢 */
        .left-player {
            flex: 4; 
            background-color: var(--mario-red);
            border-right: 6px solid var(--outline-black);
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: flex-start; 
            padding: 2rem; 
            position: relative;
        }

        .player-station { display: flex; flex-direction: column; width: 450px; position: relative; }

        /* 拟物化唱机播放器 */
        .record-player {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 300px;
            background-color: var(--outline-black); 
            border: 6px solid var(--outline-black); box-shadow: 8px 8px 0px var(--outline-black);
            position: relative; margin-bottom: 2rem; 
        }

        .turntable { 
            width: 250px; height: 250px; 
            border-radius: 50%; border: 4px solid var(--famicom-grey); 
            position: absolute; z-index: 1; 
            overflow: hidden;
            background-color: #333; /* 默认底色 */
        }

        .turntable img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
            opacity: 0; /* 初始隐藏，加载后显示 */
            transition: opacity 0.5s;
        }

        .center-hole { 
            width: 60px; height: 60px; 
            background-color: #111; border-radius: 50%; 
            position: absolute; z-index: 2; 
            border: 2px solid #333;
        }

        @keyframes rotate-cover { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .turntable.playing { animation: rotate-cover 10s linear infinite; }

        .tonearm { width: 120px; height: 120px; border: 4px solid var(--famicom-grey); border-bottom: none; border-right: none; position: absolute; top: 20px; right: 20px; z-index: 15; transition: transform 0.5s; transform-origin: top right; }
        .cartridge { width: 16px; height: 16px; background-color: var(--pixel-white); border: 2px solid var(--outline-black); position: absolute; bottom: -8px; left: -8px; }
        .tonearm.playing { transform: rotate(15deg); }

        /* 信息与进度条 */
        .widget-top-info { background-color: #FFFFFF22; border: 4px solid var(--outline-black); box-shadow: 6px 6px 0px var(--outline-black); padding: 15px; color: var(--pixel-white); margin-bottom: 2px; }
        .info-song-title { font-size: 18px; margin-bottom: 4px; }
        .info-artist { font-size: 14px; margin-bottom: 10px; opacity: 0.8; }
        
        .progress-container { width: 100%; height: 14px; padding: 4px 0; cursor: pointer; position: relative; }
        .progress-track { width: 100%; height: 6px; background-color: var(--progress-bg); border: 2px solid var(--outline-black); }
        .progress-bar { height: 100%; width: 0%; background-color: var(--progress-filled); position: relative; }
        .progress-bar::after { content: ''; position: absolute; right: -5px; top: -3px; width: 10px; height: 12px; background-color: var(--pixel-white); border: 2px solid var(--outline-black); }

        .time-display { font-size: 12px; color: #FFFFFF88; display: flex; justify-content: space-between; margin-top: 4px; }

        .widget-bottom-controls { background-color: var(--pixel-white); border: 4px solid var(--outline-black); box-shadow: 6px 6px 0px var(--outline-black); padding: 10px; display: flex; justify-content: flex-end; align-items: center; gap: 20px; }
        .control-btn { background: none; border: none; cursor: pointer; font-size: 22px; transition: transform 0.1s; }

        /* 右侧播放列表 */
        .right-playlist { flex: 6; background-color: var(--pixel-white); overflow-y: auto; padding: 2rem; }
        .playlist-header { font-size: 28px; margin-bottom: 2rem; border-bottom: 6px solid var(--outline-black); padding-bottom: 1rem; color: var(--mario-red); }
        
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 1rem; border-bottom: 4px dashed var(--outline-black); cursor: pointer; }
        .song-item:hover { background-color: var(--mario-red); color: var(--pixel-white); }
        .song-item.active { background-color: var(--mario-red); color: var(--pixel-white); border-bottom-style: solid; }

        .list-play-icon { font-family: 'Press Start 2P', cursive; font-size: 12px; margin-right: 10px; }

        /* 底部全宽歌词 */
        .global-lyrics-bar {
            height: 100px; width: 100vw; overflow: hidden; position: fixed; bottom: 0; left: 0;
            background-color: var(--outline-black); border-top: 6px solid var(--outline-black);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
            z-index: 100; 
        }
        .global-lyric-wrapper { position: absolute; width: 100%; text-align: center; transition: transform 0.4s ease-out; top: 0; }
        .global-lyric-line { line-height: 34px; height: 34px; font-size: 16px; color: rgba(255, 255, 255, 0.3); transition: all 0.3s; }
        .global-lyric-line.active { color: var(--pixel-white); font-size: 20px; font-weight: bold; }

    </style>
</head>
<body>

    <div class="container">
        <div class="left-player">
            <div class="player-station">
                <div class="record-player">
                    <div class="turntable" id="turntable">
                        <img src="" alt="" id="current-cover">
                        <div class="center-hole"></div>
                    </div>
                    <div class="tonearm" id="tonearm"><div class="cartridge"></div></div>
                </div>

                <div class="widget-top-info">
                    <div class="info-song-title" id="current-title">请选择舞台...</div>
                    <div class="info-artist" id="current-artist">-</div>
                    <div class="progress-container" id="prog-cont">
                        <div class="progress-track"><div class="progress-bar" id="prog-bar"></div></div>
                    </div>
                    <div class="time-display"><span id="cur-time">00:00</span><span id="total-dur">00:00</span></div>
                </div>
                
                <div class="widget-bottom-controls">
                    <button class="control-btn" onclick="prevSong()">&#9198;</button>
                    <button class="control-btn" onclick="togglePlay()" id="master-play-btn" style="color:var(--mario-red)">&#9199;</button>
                    <button class="control-btn" onclick="nextSong()">&#9197;</button>
                </div>
            </div>
            <audio id="audio-player"></audio>
        </div>

        <div class="right-playlist">
            <h2 class="playlist-header">播放列表</h2>
            <div id="playlist-container"></div>
        </div>
    </div>

    <div class="global-lyrics-bar" id="lrc-container">
        <div class="global-lyric-wrapper" id="lrc-wrapper"></div>
    </div>

    <script>
        const playlist = [
          {
            id: 1, title: "素颜", artist: "许嵩_何曼婷",
            src: "./audio/suyan.mp3", cover: "./images/suyan.webp",
            lrcPath: "./lyrics/suyan.lrc", duration: "03:58"
          },
          {
            id: 2, title: "我用什么把你留住", artist: "福禄寿FloruitShow",
            src: "./audio/woyong.mp3", cover: "./images/woyong.webp",
            lrcPath: "./lyrics/woyong.lrc", duration: "05:30"
          }
        ];

        const audio = document.getElementById('audio-player');
        const progBar = document.getElementById('prog-bar');
        const progCont = document.getElementById('prog-cont');
        const curTimeEl = document.getElementById('cur-time');
        const totalDurEl = document.getElementById('total-dur');
        const turntable = document.getElementById('turntable');
        const tonearm = document.getElementById('tonearm');
        const lrcWrapper = document.getElementById('lrc-wrapper');
        const lrcContainer = document.getElementById('lrc-container');
        const playlistCont = document.getElementById('playlist-container');

        let curIdx = -1;
        let isPlaying = false;
        let isDragging = false;
        let parsedLrc = [];
        let curLrcIdx = -1;

        function init() {
            playlistCont.innerHTML = '';
            playlist.forEach((song, i) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <span>0${i+1}. ${song.title}</span>
                    <div><span class="list-play-icon" id="list-icon-${i}">&#9654;</span><span>${song.duration}</span></div>
                `;
                div.onclick = () => (curIdx === i) ? togglePlay() : select(i);
                playlistCont.appendChild(div);
            });
        }

        function select(i) {
            curIdx = i;
            const song = playlist[i];
            document.getElementById('current-title').innerText = song.title;
            document.getElementById('current-artist').innerText = song.artist;
            const coverImg = document.getElementById('current-cover');
            coverImg.src = song.cover;
            coverImg.style.opacity = 1;
            totalDurEl.innerText = song.duration;
            audio.src = song.src;
            
            // 加载外部歌词
            fetch(song.lrcPath)
                .then(res => res.text())
                .then(text => {
                    parsedLrc = parse(text);
                    render(parsedLrc);
                })
                .catch(() => {
                    lrcWrapper.innerHTML = '<div class="global-lyric-line">未找到歌词文件</div>';
                    parsedLrc = [];
                });

            updateUI();
            play();
        }

        function parse(text) {
            const lines = text.split('\n');
            const result = [];
            const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            lines.forEach(line => {
                const match = timeExp.exec(line);
                if (match) {
                    const t = parseInt(match[1])*60 + parseInt(match[2]) + (match[3].length===2 ? match[3]*10 : match[3]*1)/1000;
                    const txt = line.replace(timeExp, '').trim();
                    if(txt) result.push({ time: t, text: txt });
                }
            });
            return result.sort((a,b) => a.time - b.time);
        }

        function render(lyrics) {
            lrcWrapper.innerHTML = '';
            lyrics.forEach((l, i) => {
                const d = document.createElement('div');
                d.className = 'global-lyric-line';
                d.id = 'lrc-' + i;
                d.innerText = l.text;
                lrcWrapper.appendChild(d);
            });
            scrollLrc(0);
            curLrcIdx = -1;
        }

        function scrollLrc(idx) {
            const h = 100; // 容器高度
            const lh = 34; // 行高
            const offset = (h/2) - (lh/2) - (idx * lh);
            lrcWrapper.style.transform = `translateY(${offset}px)`;
        }

        function updateUI() {
            const items = document.querySelectorAll('.song-item');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === curIdx);
                const icon = document.getElementById(`list-icon-${i}`);
                icon.innerHTML = (i === curIdx && isPlaying) ? '&#10074;&#10074;' : '&#9654;';
            });
        }

        function togglePlay() {
            if (curIdx === -1) return select(0);
            isPlaying ? pause() : play();
        }

        function play() {
            audio.play(); isPlaying = true;
            document.getElementById('master-play-btn').innerHTML = '&#9208;';
            turntable.classList.add('playing');
            tonearm.classList.add('playing');
            updateUI();
        }

        function pause() {
            audio.pause(); isPlaying = false;
            document.getElementById('master-play-btn').innerHTML = '&#9199;';
            turntable.classList.remove('playing');
            tonearm.classList.remove('playing');
            updateUI();
        }

        function nextSong() { select((curIdx + 1) % playlist.length); }
        function prevSong() { select((curIdx - 1 + playlist.length) % playlist.length); }

        audio.ontimeupdate = () => {
            if (isDragging) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            progBar.style.width = pct + '%';
            curTimeEl.innerText = format(audio.currentTime);

            if (parsedLrc.length > 0) {
                let idx = parsedLrc.findIndex(l => l.time > audio.currentTime);
                let active = idx === -1 ? parsedLrc.length - 1 : (idx === 0 ? 0 : idx - 1);
                if (active !== curLrcIdx) {
                    if (curLrcIdx !== -1) document.getElementById('lrc-'+curLrcIdx)?.classList.remove('active');
                    document.getElementById('lrc-'+active)?.classList.add('active');
                    scrollLrc(active);
                    curLrcIdx = active;
                }
            }
        };

        function format(s) {
            if (isNaN(s)) return "00:00";
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        // 拖拽进度条逻辑
        function seek(e) {
            const w = progCont.clientWidth;
            const x = Math.max(0, Math.min(e.offsetX, w));
            if (audio.duration) {
                const time = (x/w) * audio.duration;
                progBar.style.width = (x/w)*100 + '%';
                curTimeEl.innerText = format(time);
                return time;
            }
            return 0;
        }

        progCont.onmousedown = (e) => {
            if(curIdx === -1) return;
            isDragging = true;
            seek(e);
        };

        window.onmousemove = (e) => {
            if (isDragging) {
                const rect = progCont.getBoundingClientRect();
                seek({ offsetX: e.clientX - rect.left });
            }
        };

        window.onmouseup = (e) => {
            if (isDragging) {
                isDragging = false;
                const rect = progCont.getBoundingClientRect();
                audio.currentTime = seek({ offsetX: e.clientX - rect.left });
            }
        };

        init();
    </script>
</body>
</html>
