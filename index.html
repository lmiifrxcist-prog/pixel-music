<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的像素音乐盒 - v13.2 终极修复版</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --mario-red: #E52521;
            --mario-red-dark: #A51A17; 
            --mario-red-light: #FF5A57; 
            --pixel-white: #FFFFFF;
            --pixel-white-dark: #E0E0E0; 
            --outline-black: #000000;
            --famicom-grey: #F8F8F8;
            --progress-filled: #FFFFFF;
            --progress-bg: #FFFFFF44;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'VT323', monospace; font-size: 24px;
            background-color: var(--outline-black); color: var(--outline-black);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; 
            user-select: none; position: relative;
        }

        /* 全局 CRT 像素网格叠加层 */
        body::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0, 0, 0, 0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(0, 0, 0, 0.05) 2px, transparent 2px);
            background-size: 4px 4px; pointer-events: none; z-index: 999;
        }

        h1, h2, .song-title, .artist-name { font-family: 'DotGothic16', sans-serif; font-weight: normal; }

        /* 顶部导航栏 */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 20px; background-color: var(--famicom-grey);
            border-bottom: 4px solid var(--outline-black); z-index: 50; position: relative;
        }
        .nav-logo-area { display: flex; align-items: center; gap: 10px; }
        .mario-hello-logo { height: 40px; image-rendering: pixelated; }
        .top-nav h1 { font-size: 20px; margin: 0; }
        
        .random-btn {
            font-family: 'DotGothic16', sans-serif; font-size: 16px;
            background-color: var(--pixel-white); border: 4px solid var(--outline-black);
            box-shadow: 4px 4px 0px var(--outline-black); padding: 5px 15px;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .random-btn:active, .control-btn:active { transform: translate(2px, 2px) scale(0.95); box-shadow: 0px 0px 0px var(--outline-black); }

        .container { display: flex; height: calc(100vh - 60px); width: 100vw; flex-direction: row; position: relative; }

        /* 左侧：播放器中枢 */
        .left-player {
            flex: 4; background-color: var(--mario-red); border-right: 6px solid var(--outline-black);
            box-shadow: inset 6px 6px 0px var(--mario-red-light), inset -6px -6px 0px var(--mario-red-dark);
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            padding: 2.5rem 2rem; position: relative; z-index: 10;
        }

        /* 星星无敌闪烁状态 */
        @keyframes starPowerFlashing {
            0% { background-color: #E52521; }
            20% { background-color: #FFD700; }
            40% { background-color: #00FF00; }
            60% { background-color: #00FFFF; }
            80% { background-color: #FF00FF; }
            100% { background-color: #E52521; }
        }
        .star-power-active { animation: starPowerFlashing 0.2s infinite; }

        .player-station { display: flex; flex-direction: column; width: 450px; position: relative; z-index: 20; }

        .record-player-bay {
            width: 100%; height: 300px; background-color: #111; border: 6px solid var(--outline-black); 
            box-shadow: 8px 8px 0px var(--outline-black), inset 10px 10px 20px rgba(0,0,0,0.8);
            position: relative; margin-bottom: 2rem; display: flex; justify-content: center; align-items: center;
        }
        .record-player-bay::before {
            content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            background-image: repeating-linear-gradient(0deg, #333, #333 2px, transparent 2px, transparent 6px), repeating-linear-gradient(90deg, #333, #333 2px, transparent 2px, transparent 6px);
            -webkit-mask-image: radial-gradient(circle, transparent 115px, black 116px); mask-image: radial-gradient(circle, transparent 115px, black 116px);
            image-rendering: pixelated; pointer-events: none; z-index: 0;
        }

        .turntable-platter {
            width: 250px; height: 250px; border-radius: 50%; border: 4px solid var(--famicom-grey); 
            position: absolute; z-index: 1; overflow: hidden; background-color: #2a2a2a; box-shadow: inset 4px 4px 0px #333;
        }
        
        .press-start-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--mario-red); font-family: 'Press Start 2P', cursive; font-size: 18px;
            text-shadow: 2px 2px 0 var(--outline-black), -2px -2px 0 var(--outline-black), 2px -2px 0 var(--outline-black), -2px 2px 0 var(--outline-black);
            animation: pressStartBlink 1s infinite; z-index: 10; pointer-events: none; width: 100%; text-align: center;
            line-height: 1.5;
        }
        @keyframes pressStartBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .turntable-platter img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 0.5s; }
        .center-hole { width: 60px; height: 60px; background-color: #111; border-radius: 50%; position: absolute; z-index: 2; border: 2px solid #333; }

        @keyframes rotate-cover { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .turntable-platter.playing { animation: rotate-cover 10s linear infinite; }

        .tonearm { width: 120px; height: 120px; border: 4px solid var(--famicom-grey); border-bottom: none; border-right: none; position: absolute; top: 20px; right: 20px; z-index: 15; transition: transform 0.5s; transform-origin: top right; }
        .tonearm.playing { transform: rotate(15deg); }

        .note-bay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 15; }
        .floating-note {
            position: absolute; color: var(--pixel-white); font-family: 'Press Start 2P', cursive; font-size: 16px; 
            animation: floatUp 2s ease-in forwards; text-shadow: 2px 2px 0 var(--outline-black);
        }
        @keyframes floatUp {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(calc(20px - 40px * var(--dir)), -150px) scale(1.5) rotate(calc(45deg * var(--dir))); opacity: 0; }
        }

        .widget-top-info { background-color: #FFFFFF22; border: 4px solid var(--outline-black); box-shadow: 6px 6px 0px var(--outline-black); padding: 15px; color: var(--pixel-white); margin-bottom: 2px; position: relative; }
        .info-song-title { font-size: 18px; margin-bottom: 4px; }
        .info-artist { font-size: 14px; margin-bottom: 10px; opacity: 0.8; }
        .progress-container { width: 100%; height: 14px; padding: 4px 0; cursor: pointer; position: relative; z-index: 5; }
        .progress-track { width: 100%; height: 6px; background-color: var(--progress-bg); border: 2px solid var(--outline-black); }
        .progress-bar { height: 100%; width: 0%; background-color: var(--progress-filled); position: relative; }
        .progress-bar::after { content: ''; position: absolute; right: -5px; top: -3px; width: 10px; height: 12px; background-color: var(--pixel-white); border: 2px solid var(--outline-black); box-shadow: 3px 3px 0 var(--outline-black), inset 2px 2px 0 var(--pixel-white-dark); }
        .time-display { font-size: 12px; color: #FFFFFF88; display: flex; justify-content: space-between; margin-top: 4px; }

        .widget-bottom-controls { background-color: var(--pixel-white); border: 4px solid var(--outline-black); box-shadow: 6px 6px 0px var(--outline-black), inset 3px 3px 0 var(--pixel-white-dark); padding: 10px; display: flex; justify-content: flex-end; align-items: center; gap: 20px; z-index: 20; }
        .control-btn { background: none; border: none; cursor: pointer; font-size: 22px; transition: transform 0.1s; }

        /* 右侧播放列表 */
        .right-playlist { 
            flex: 6; background-color: var(--pixel-white); overflow-y: auto; padding: 2.5rem 2rem; 
            scrollbar-width: thin; scrollbar-color: var(--mario-red) var(--famicom-grey); padding-bottom: 150px; position: relative;
        }
        .right-playlist::-webkit-scrollbar { width: 12px; }
        .right-playlist::-webkit-scrollbar-track { background: var(--famicom-grey); border-left: 4px solid var(--outline-black); }
        .right-playlist::-webkit-scrollbar-thumb { background: var(--mario-red); border: 3px solid var(--outline-black); }

        .playlist-header-wrapper { display: flex; align-items: flex-end; gap: 20px; position: relative; border-bottom: 6px solid var(--outline-black); margin-bottom: 2rem; padding-bottom: 1rem; }
        .playlist-header { font-size: 28px; color: var(--mario-red); margin: 0; }
        .mario-mushroom-present { position: absolute; right: 10px; bottom: 0px; height: 70px; image-rendering: pixelated; }

        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 1rem; border-bottom: 4px dashed var(--outline-black); cursor: pointer; transition: background 0.2s; position: relative; }
        .song-item:nth-child(even) { background-color: var(--pixel-white-dark); }
        .song-item:hover { background-color: #FFFFD5; color: var(--outline-black); }
        .song-item.active { background-color: var(--mario-red); color: var(--pixel-white); border-bottom-style: solid; }
        .song-item .hover-pointer { opacity: 0; margin-right: 8px; font-size: 16px; transition: opacity 0.2s; transform: translateX(-5px); }
        .song-item:hover .hover-pointer { opacity: 1; transform: translateX(0); }

        /* 联动歌词栏 */
        .global-lyrics-bar {
            height: 120px; width: 100vw; position: fixed; bottom: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.85); border-top: 4px solid var(--pixel-white);
            z-index: 100; pointer-events: none; 
            transform: translateY(124px); opacity: 0;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            overflow: visible; /* 保持可见，让马里奥冒出来 */
        }
        .global-lyrics-bar.show { transform: translateY(0); opacity: 1; }

        /* 🌟 核心修复：添加专属遮罩层，裁剪多余歌词，严格保留 3 行 (120px高度) */
        .lyrics-mask {
            width: 100%; height: 120px; 
            overflow: hidden; /* 裁剪掉超过120px高度的文字！ */
            position: relative;
        }

        /* 水管马里奥 */
        .mario-pipe-pop {
            position: absolute; top: -85px; left: 20px; height: 95px;
            image-rendering: pixelated; z-index: 110; 
            transform: translateY(85px); opacity: 0; 
            transition: transform 0.5s 0.3s ease-out, opacity 0.3s 0.3s; 
        }
        .global-lyrics-bar.show .mario-pipe-pop { transform: translateY(0); opacity: 1; }
        .mario-pipe-pop.jump { animation: marioJump 0.4s ease-out; }
        @keyframes marioJump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-50px); } 
            100% { transform: translateY(0); }
        }

        .global-lyric-wrapper { position: absolute; width: 100%; text-align: center; transition: transform 0.4s ease-out; top: 0; }
        .global-lyric-line { line-height: 40px; height: 40px; font-size: 18px; color: rgba(255, 255, 255, 0.5); text-shadow: 2px 2px 0 #000; transition: all 0.3s; }
        .global-lyric-line.active { color: #FFDE00; font-size: 24px; font-weight: bold; text-shadow: 3px 3px 0 #000, -3px -3px 0 #000; }

        /* GAME OVER 画面 */
        .game-over-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); color: var(--mario-red); 
            font-family: 'Press Start 2P', cursive; font-size: 8vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            text-shadow: 4px 4px 0 var(--pixel-white), 8px 8px 0 var(--outline-black);
            cursor: pointer;
        }
        .game-over-screen.show { opacity: 1; pointer-events: auto; }
        .game-over-subtext {
            font-family: 'DotGothic16', sans-serif; font-size: 24px; color: var(--pixel-white);
            margin-top: 20px; text-shadow: none; animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="game-over-screen" id="game-over" onclick="skipGameOver()">
        GAME OVER
        <div class="game-over-subtext">CLICK TO CONTINUE...</div>
    </div>

    <div class="top-nav">
        <div class="nav-logo-area">
            <img class="mario-hello-logo" src="./images2/mario-hello.png" alt="Mario Hello">
            <h1>我的像素音乐盒 v13.2</h1>
        </div>
        <button class="random-btn" onclick="playRandom();">
            随机播放 <span style="font-family: 'Press Start 2P', cursive; font-size: 10px;">&#9654;</span>
        </button>
    </div>

    <div class="container">
        <div class="left-player" id="left-player-body">
            <div class="player-station">
                <div class="record-player-bay" id="record-player-bay">
                    <div class="note-bay" id="note-bay"></div>
                    <div class="turntable-platter" id="turntable">
                        <div class="press-start-text" id="press-start-text">PRESS START<br><br><span style="font-size: 12px; color: var(--pixel-white)">TO PLAY MUSIC</span></div>
                        <img src="" alt="" id="current-cover">
                        <div class="center-hole"></div>
                    </div>
                    <div class="tonearm" id="tonearm"><div class="cartridge"></div></div>
                </div>

                <div class="widget-top-info">
                    <div class="info-song-title" id="current-title">请选择曲目...</div>
                    <div class="info-artist" id="current-artist">-</div>
                    <div class="progress-container" id="prog-cont">
                        <div class="progress-track"><div class="progress-bar" id="prog-bar"></div></div>
                    </div>
                    <div class="time-display"><span id="cur-time">00:00</span><span id="total-dur">00:00</span></div>
                </div>
                
                <div class="widget-bottom-controls">
                    <button class="control-btn" onclick="playBeep(440); prevSong();">&#9198;</button>
                    <button class="control-btn" onclick="playBeep(1100); togglePlay();" id="master-play-btn" style="color:var(--mario-red)">&#9199;</button>
                    <button class="control-btn" onclick="playBeep(440); nextSong();">&#9197;</button>
                </div>
            </div>
            <audio id="audio-player"></audio>
        </div>

        <div class="right-playlist">
            <div class="playlist-header-wrapper">
                <h2 class="playlist-header">播放列表</h2>
                <img class="mario-mushroom-present" src="./images2/mario-mushroom.png" alt="Mario Mushroom">
            </div>
            <div id="playlist-container"></div>
        </div>
    </div>

    <div class="global-lyrics-bar" id="lrc-container">
        <img class="mario-pipe-pop" id="mario-pop" src="./images2/mario-pipe.png" alt="Mario Pipe">
        <div class="lyrics-mask">
            <div class="global-lyric-wrapper" id="lrc-wrapper"></div>
        </div>
    </div>

    <script>
        const playlist = [
          { id: 1, title: "素颜", artist: "许嵩_何曼婷", src: "./audio/suyan.mp3", cover: "./images/suyan.webp", lrcPath: "./lyrics/suyan.lrc", duration: "03:58" },
          { id: 2, title: "我用什么把你留住", artist: "福禄寿FloruitShow", src: "./audio/woyong.mp3", cover: "./images/woyong.webp", lrcPath: "./lyrics/woyong.lrc", duration: "05:30" },
          { id: 3, title: "辜负", artist: "林小珂", src: "./audio/gufu.mp3", cover: "./images/gufu.webp", lrcPath: "./lyrics/gufu.lrc", duration: "03:23" },
          { id: 4, title: "执迷不悟", artist: "小乐哥", src: "./audio/zhimi.mp3", cover: "./images/zhimi.webp", lrcPath: "./lyrics/zhimi.lrc", duration: "03:54" },
          { id: 5, title: "海屿你", artist: "马也", src: "./audio/haiyuni.mp3", cover: "./images/haiyuni.webp", lrcPath: "./lyrics/haiyuni.lrc", duration: "04:55" },
          { id: 6, title: "心似烟火", artist: "陈壹千", src: "./audio/xinsi.mp3", cover: "./images/xinsi.webp", lrcPath: "./lyrics/xinsi.lrc", duration: "04:31" },
          { id: 7, title: "旅行中忘记", artist: "袁娅维", src: "./audio/lvxing.mp3", cover: "./images/lvxing.webp", lrcPath: "./lyrics/lvxing.lrc", duration: "03:54" },
          { id: 8, title: "等你的季节", artist: "刘诗诗", src: "./audio/dengni.mp3", cover: "./images/dengni.webp", lrcPath: "./lyrics/dengni.lrc", duration: "04:01" },
          { id: 9, title: "东方神起", artist: "Mirotic", src: "./audio/dongfang.mp3", cover: "./images/dongfang.webp", lrcPath: "./lyrics/dongfang.lrc", duration: "03:27" },
          { id: 10, title: "暖", artist: "方大同", src: "./audio/nuan.mp3", cover: "./images/nuan.webp", lrcPath: "./lyrics/nuan.lrc", duration: "03:44" },
          { id: 11, title: "太聪明", artist: "欧阳娜娜", src: "./audio/taicongming.mp3", cover: "./images/taicongming.webp", lrcPath: "./lyrics/taicongming.lrc", duration: "04:36" }
        ];

        const audio = document.getElementById('audio-player');
        const progBar = document.getElementById('prog-bar');
        const progCont = document.getElementById('prog-cont');
        const curTimeEl = document.getElementById('cur-time');
        const totalDurEl = document.getElementById('total-dur');
        const turntable = document.getElementById('turntable');
        const tonearm = document.getElementById('tonearm');
        const lrcWrapper = document.getElementById('lrc-wrapper');
        const lrcContainer = document.getElementById('lrc-container');
        const playlistCont = document.getElementById('playlist-container');
        const marioPop = document.getElementById('mario-pop');
        const leftPlayerBody = document.getElementById('left-player-body');
        const gameOverScreen = document.getElementById('game-over');
        const pressStartText = document.getElementById('press-start-text');

        let curIdx = -1; let isPlaying = false; let isDragging = false; let parsedLrc = []; let curLrcIdx = -1; let noteInterval; let gameOverTimer;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 880) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + 0.05);
            
            // 🌟 核心修复：提升 GainNode 到 1.5，按键音量暴增！
            gain.gain.setValueAtTime(1.5, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function init() {
            playlistCont.innerHTML = '';
            playlist.forEach((song, i) => {
                const div = document.createElement('div'); div.className = 'song-item';
                div.innerHTML = `<div class="song-title-wrapper"><span class="hover-pointer">👉</span><span>${(i+1).toString().padStart(2,'0')}. ${song.title}</span></div><div><span class="list-play-icon" id="list-icon-${i}">&#9654;</span><span>${song.duration}</span></div>`;
                div.onclick = () => { playBeep(1320); (curIdx === i) ? togglePlay() : select(i); };
                playlistCont.appendChild(div);
            });
        }

        function playRandom() {
            if (playlist.length === 0) return;
            let randomIdx;
            do { randomIdx = Math.floor(Math.random() * playlist.length); } while (randomIdx === curIdx && playlist.length > 1);
            
            leftPlayerBody.classList.add('star-power-active');
            playBeep(880); setTimeout(()=>playBeep(1100), 100); setTimeout(()=>playBeep(1320), 200);
            setTimeout(() => { leftPlayerBody.classList.remove('star-power-active'); }, 1500);

            select(randomIdx);
        }

        function marioJumpEffect() {
            marioPop.classList.remove('jump');
            void marioPop.offsetWidth; 
            marioPop.classList.add('jump');
        }

        function select(i) {
            if (curIdx !== -1 && curIdx !== i) {
                marioJumpEffect();
            }

            curIdx = i; const song = playlist[i];
            
            if (pressStartText) pressStartText.style.display = 'none';

            document.getElementById('current-title').innerText = song.title;
            document.getElementById('current-artist').innerText = song.artist;
            const coverImg = document.getElementById('current-cover');
            coverImg.src = song.cover; coverImg.style.opacity = 1;
            totalDurEl.innerText = song.duration; audio.src = song.src;
            
            fetch(song.lrcPath).then(res => res.text()).then(text => { parsedLrc = parse(text); render(parsedLrc); })
            .catch(() => { lrcWrapper.innerHTML = '<div class="global-lyric-line">暂无歌词</div>'; parsedLrc = []; });
            updateUI(); play();
        }

        function parse(text) {
            const lines = text.split('\n'); const result = []; const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            lines.forEach(line => {
                const match = timeExp.exec(line);
                if (match) {
                    const t = parseInt(match[1])*60 + parseInt(match[2]) + (match[3].length===2 ? match[3]*10 : match[3]*1)/1000;
                    const txt = line.replace(timeExp, '').trim(); if(txt) result.push({ time: t, text: txt });
                }
            });
            return result.sort((a,b) => a.time - b.time);
        }

        function render(lyrics) {
            lrcWrapper.innerHTML = '';
            lyrics.forEach((l, i) => { const d = document.createElement('div'); d.className = 'global-lyric-line'; d.id = 'lrc-' + i; d.innerText = l.text; lrcWrapper.appendChild(d); });
            scrollLrc(0); curLrcIdx = -1;
        }

        function scrollLrc(idx) { const h = 120; const lh = 40; const offset = (h/2) - (lh/2) - (idx * lh); lrcWrapper.style.transform = `translateY(${offset}px)`; }
        
        function updateUI() {
            const items = document.querySelectorAll('.song-item');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === curIdx);
                const icon = document.getElementById(`list-icon-${i}`);
                if(icon) icon.innerHTML = (i === curIdx && isPlaying) ? '&#10074;&#10074;' : '&#9654;';
            });
        }
        
        function togglePlay() { if (curIdx === -1) return select(0); isPlaying ? pause() : play(); }
        
        function spawnNote() {
            const note = document.createElement('div'); note.className = 'floating-note'; note.innerText = Math.random() > 0.5 ? '♪' : '♫';
            note.style.left = '50%'; note.style.top = '50%'; note.style.setProperty('--dir', Math.random() > 0.5 ? 1 : -1);
            document.getElementById('record-player-bay').appendChild(note);
            setTimeout(() => { if(note.parentNode) note.parentNode.removeChild(note); }, 2000);
        }

        function play() {
            audio.play(); isPlaying = true;
            document.getElementById('master-play-btn').innerHTML = '&#9208;';
            turntable.classList.add('playing'); tonearm.classList.add('playing');
            lrcContainer.classList.add('show'); 
            if(!noteInterval) noteInterval = setInterval(spawnNote, 600);
            updateUI();
        }

        function pause() {
            audio.pause(); isPlaying = false;
            document.getElementById('master-play-btn').innerHTML = '&#9199;';
            turntable.classList.remove('playing'); tonearm.classList.remove('playing');
            lrcContainer.classList.remove('show'); 
            clearInterval(noteInterval); noteInterval = null;
            updateUI();
        }

        function nextSong() { marioJumpEffect(); select((curIdx + 1) % playlist.length); }
        function prevSong() { marioJumpEffect(); select((curIdx - 1 + playlist.length) % playlist.length); }

        audio.ontimeupdate = () => {
            if (isDragging) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            progBar.style.width = pct + '%';
            curTimeEl.innerText = format(audio.currentTime);
            if (parsedLrc.length > 0) {
                let idx = parsedLrc.findIndex(l => l.time > audio.currentTime);
                let active = idx === -1 ? parsedLrc.length - 1 : (idx === 0 ? 0 : idx - 1);
                if (active !== curLrcIdx) {
                    if (curLrcIdx !== -1) document.getElementById('lrc-'+curLrcIdx)?.classList.remove('active');
                    document.getElementById('lrc-'+active)?.classList.add('active');
                    scrollLrc(active); curLrcIdx = active;
                }
            }
        };

        function showGameOver() {
            gameOverScreen.classList.add('show');
            pause(); 
            playBeep(300); setTimeout(() => playBeep(250), 200); setTimeout(() => playBeep(200), 400);

            gameOverTimer = setTimeout(() => {
                gameOverScreen.classList.remove('show');
                nextSong();
            }, 2500);
        }

        function skipGameOver() {
            clearTimeout(gameOverTimer);
            gameOverScreen.classList.remove('show');
            nextSong();
        }

        audio.onended = showGameOver;

        function format(s) { if (isNaN(s)) return "00:00"; const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        function seek(e) { const w = progCont.clientWidth; const x = Math.max(0, Math.min(e.offsetX, w)); if (audio.duration) { const time = (x/w) * audio.duration; progBar.style.width = (x/w)*100 + '%'; curTimeEl.innerText = format(time); return time; } return 0; }
        progCont.onmousedown = (e) => { if(curIdx === -1) return; isDragging = true; seek(e); }; window.onmousemove = (e) => { if (isDragging) { const rect = progCont.getBoundingClientRect(); seek({ offsetX: e.clientX - rect.left }); } }; window.onmouseup = (e) => { if (isDragging) { isDragging = false; const rect = progCont.getBoundingClientRect(); audio.currentTime = seek({ offsetX: e.clientX - rect.left }); } };
        
        init();
    </script>
</body>
</html>
